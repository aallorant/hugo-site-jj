backend:
  name: git-gateway
media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "oeuvres"
    label: "Œuvres"
    folder: "content/oeuvres"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Résumé", name: "summary", widget: "text", required: false }
      - label: "Image de couverture"
        name: "cover"
        widget: "object"
        fields:
          - { label: "Fichier", name: "image", widget: "image" }
          - { label: "Texte alternatif", name: "alt", widget: "string", required: false }
          - { label: "Légende", name: "caption", widget: "string", required: false }
      - { label: "Contenu", name: "body", widget: "markdown", required: false }

  - name: "evenements"
    label: "Événements"
    folder: "content/evenements"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Résumé", name: "summary", widget: "text", required: false }
      - label: "Image de couverture"
        name: "cover"
        widget: "object"
        fields:
          - { label: "Fichier", name: "image", widget: "image" }
          - { label: "Texte alternatif", name: "alt", widget: "string", required: false }
          - { label: "Légende", name: "caption", widget: "string", required: false }
      - { label: "Contenu", name: "body", widget: "markdown", required: false }

  - name: "pages"
    label: "Pages"
    files:
      - label: "À propos"
        name: "a-propos"
        file: "content/a-propos/index.md"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Contenu", name: "body", widget: "markdown" }
      - label: "Contact"
        name: "contact"
        file: "content/contact/index.md"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Contenu", name: "body", widget: "markdown" }
