{{- $contactURL := cond (eq .Lang "fr") "/contact/" "/en/contact/" -}}
{{- $aboutURL := cond (eq .Lang "fr") "/a-propos/" "/en/about/" -}}
<footer class="site-footer">
  <div class="site-footer__inner container">
    <div class="site-footer__col site-footer__col--brand">
      <p class="site-footer__name">Les Amis de Jeanne Jozon</p>
      <p class="site-footer__tagline">{{ .Site.Params.subtitle }}</p>
    </div>
    <nav class="site-footer__col site-footer__col--links" aria-label="{{ if eq .Lang "fr" }}Liens secondaires{{ else }}Secondary links{{ end }}">
      <ul>
        <li><a href="{{ $contactURL }}">{{ i18n "footer_contact" }}</a></li>
        <li><a href="{{ $aboutURL }}">{{ i18n "footer_about" }}</a></li>
      </ul>
    </nav>
    <div class="site-footer__col site-footer__col--copyright">
      <p>{{ .Site.Params.copyright }}</p>
      <p class="site-footer__years">1868&thinsp;–&thinsp;1946</p>
    </div>
  </div>
</footer>
