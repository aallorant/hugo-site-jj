{{ define "main" }}
<article class="prose">
  <h1>{{ .Title }}</h1>
  
  <p style="color: #666;">
    📅 {{ .Date.Format "02/01/2006 à 15:04" }}
    {{ with .Params.lieu }} · 📍 {{ . }}{{ end }}
  </p>

  {{ with .Params.image }}
  <img src="{{ . }}" alt="{{ $.Title }}" style="max-width: 100%; margin: 1rem 0;">
  {{ end }}

  {{ .Content }}

  <p style="margin-top: 2rem;">
    <a href="/evenements/">← Retour aux événements</a>
  </p>
</article>
{{ end }}
