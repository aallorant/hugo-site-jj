baseURL: "https://example.netlify.app/"
languageCode: "fr-fr"
title: "Les Amis de Jeanne Jozon"
theme: "PaperMod"
enableRobotsTXT: true
summaryLength: 20
defaultContentLanguage: fr

# Menus (top navigation)
menu:
  main:
    - name: Accueil
      url: /
      weight: 1
    - name: À propos
      url: /a-propos/
      weight: 2
    - name: Œuvres
      url: /oeuvres/
      weight: 3
    - name: Événements
      url: /evenements/
      weight: 4
    - name: Contact
      url: /contact/
      weight: 5

params:
  description: "Site dédié à la mémoire de Jeanne Jozon, artiste-sculptrice"
  author: "Les Amis de Jeanne Jozon"
  defaultTheme: light        # or auto / dark
  disableThemeToggle: false
  ShowBreadCrumbs: true
  ShowPostNavLinks: true
  ShowReadingTime: false
  ShowShareButtons: false
  ShowCodeCopyButtons: true
  hideFooter: false

  # Home intro box (PaperMod)
  homeInfoParams:
    Title: "Les Amis de Jeanne Jozon"
    Content: >
      Association dédiée à la mémoire de Jeanne Jozon, sculptrice. Découvrez sa biographie,
      ses œuvres et les événements à venir.

  # Card thumbnails use "cover" from front matter
  assets:
    disableFingerprinting: true

# Taxonomies if you want to tag works later
taxonomies:
  tag: "tags"
  category: "categories"

# Build settings
markup:
  goldmark:
    renderer:
      unsafe: true   # allows raw HTML in content if needed
