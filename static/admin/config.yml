backend:
  name: git-gateway
  branch: main

locale: "fr"

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  # =====================
  # ÉVÉNEMENTS
  # =====================
  - name: "evenements"
    label: "Événements"
    label_singular: "Événement"
    folder: "content/evenements"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    summary: "{{title}} — {{date}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date de l'événement", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY" }
      - { label: "Lieu", name: "lieu", widget: "string", required: false }
      - { label: "Résumé", name: "summary", widget: "text", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Contenu", name: "body", widget: "markdown", required: false }

  # =====================
  # PAGES PRINCIPALES  
  # =====================
  - name: "pages"
    label: "Pages"
    files:
      - label: "Accueil"
        name: "accueil"
        file: "content/_index.md"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Contenu", name: "body", widget: "markdown" }

      - label: "Biographie"
        name: "biographie"
        file: "content/biographie/index.md"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Contenu", name: "body", widget: "markdown" }
      
      - label: "Salons et Expositions"
        name: "salons"
        file: "content/salons/index.md"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Contenu", name: "body", widget: "markdown" }
      
      - label: "À propos"
        name: "a-propos"
        file: "content/a-propos/index.md"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Contenu", name: "body", widget: "markdown" }
      
      - label: "Contact"
        name: "contact"
        file: "content/contact/index.md"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Contenu", name: "body", widget: "markdown" }

  # =====================
  # GALERIES
  # Images are uploaded to the same folder as index.md
  # Hugo automatically displays them in the gallery
  # =====================
  - name: "galeries"
    label: "Galeries"
    files:
      - label: "Atelier"
        name: "atelier"
        file: "content/atelier/index.md"
        media_folder: ""
        public_folder: ""
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Texte d'introduction", name: "body", widget: "markdown", required: false }
          - label: "Ajouter des images à la galerie"
            name: "new_images"
            widget: "list"
            label_singular: "Image"
            required: false
            hint: "Ajoutez de nouvelles images ici. Elles apparaîtront dans la galerie."
            field:
              label: "Image"
              name: "image"
              widget: "image"

      - label: "Portraits"
        name: "portrait"
        file: "content/portrait/index.md"
        media_folder: ""
        public_folder: ""
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
