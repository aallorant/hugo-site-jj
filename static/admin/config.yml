backend:
  name: git-gateway
  branch: main

locale: "fr"

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "evenements"
    label: "Événements"
    label_singular: "Événement"
    folder: "content/evenements"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Lieu", name: "lieu", widget: "string", required: false }
      - { label: "Résumé", name: "summary", widget: "text", required: false }
      - { label: "Contenu", name: "body", widget: "markdown", required: false }

  - name: "pages"
    label: "Pages"
    files:
      - label: "Biographie"
        name: "biographie"
        file: "content/biographie/index.md"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Contenu", name: "body", widget: "markdown" }
      
      - label: "Salons et Expositions"
        name: "salons"
        file: "content/salons/index.md"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Contenu", name: "body", widget: "markdown" }
      
      - label: "À propos"
        name: "a-propos"
        file: "content/a-propos/index.md"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Contenu", name: "body", widget: "markdown" }
      
      - label: "Contact"
        name: "contact"
        file: "content/contact/index.md"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Contenu", name: "body", widget: "markdown" }

      - label: "Accueil"
        name: "accueil"
        file: "content/_index.md"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Contenu", name: "body", widget: "markdown" }
