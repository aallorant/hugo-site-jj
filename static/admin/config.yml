          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Texte d'introduction (apparaît dans la section « L'atelier rue de Babylone » de la page Atelier)", name: "body", widget: "markdown", required: false }
          - label: "Ajouter des photos"
