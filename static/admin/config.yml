      - label: "Objets décoratifs — vases, bougeoirs, salières (apparaît dans Arts décoratifs)"
        name: "vases"
        file: "content/production/vases-buires-encriers-salieres/index.md"
        media_folder: ""
        public_folder: ""
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Texte d'introduction (apparaît dans la section « Objets » de la page Arts décoratifs)", name: "body", widget: "markdown", required: false }
          - label: "Ajouter des images"
            name: "new_images"
            widget: "list"
            label_singular: "Image"
            required: false
            field: { label: "Image", name: "image", widget: "image" }

      # ---- Sous-collections agrégées dans la page « Atelier » ----
      - label: "Photos pour la section « Portraits de l'artiste » (page Atelier)"
        name: "portrait"
        file: "content/portrait/index.md"
        media_folder: ""
        public_folder: ""
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
